{% extends 'base.html' %}

{% block head %}
<title>Task Master</title>
{% endblock %}

{% block body %}
<div class="content">
    <h1>✨ Task Master</h1>

    <!-- Add Task Form -->
    <form action="/" method="POST" class="form">
        <input type="text" name="content" id="content" placeholder="Enter task..." required>
        <input type="submit" value="Add">
    </form>

    {% if tasks|length == 0 %}
        <p class="empty">No tasks yet 😴</p>
    {% else %}
        <div class="tasks">
            {% for task in tasks %}
                <div class="task-card">
                    <div class="task-info">
                        <strong>{{ task.content }}</strong>
                        <small>{{ task.date_created.strftime("%d %b %Y") }}</small>
                    </div>

                    <div class="actions">
                        <a href="/update/{{task.id}}" class="edit">✏️</a>
                        <a href="/delete/{{task.id}}" class="delete">🗑️</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock %}
